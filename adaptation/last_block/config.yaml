# adaptation/last_block/config.yaml
# Default hyperparameters for last-block fine-tuning.
# Override any value via CLI flags.

training:
  lr: 5e-4                    # best from sweep (contiguous: lr5e-4/ep50/ln1/wd1e-4 → NDCG@10 +4.24%)
  weight_decay: 1e-4
  epochs: 50
  batch_size: 256
  eval_batch_size: 512
  include_last_layernorm: true
  seed: 42

evaluation:
  num_neg_eval: 100
  seed: 42

sweep:
  lr:                     [1e-3, 5e-4, 1e-4, 5e-5]
  epochs:                 [20, 50]
  include_last_layernorm: [false, true]
  weight_decay:           [0.0, 1e-4]
