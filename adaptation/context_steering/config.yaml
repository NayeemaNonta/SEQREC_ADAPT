# adaptation/context_steering/config.yaml
# Default hyperparameters for context-gate adapter.

adapter:
  bottleneck_dim: 8
  dropout: 0.0
  activation: gelu       # gelu | relu

training:
  lr: 5e-4
  weight_decay: 0.0
  epochs: 15
  batch_size: 256
  num_neg_train: 10
  seed: 42

evaluation:
  num_neg_eval: 100
  seed: 42

sweep:
  bottleneck_dim: [4, 8, 16, 32]
  lr:             [1e-3, 5e-4, 1e-4]
  epochs:         [10, 20]
