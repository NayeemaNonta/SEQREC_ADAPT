# adaptation/prototype_steering/config.yaml
#
# Best configs differ by split (full-vocab CE sweep, 60 configs):
#   tail:       k=5,  bd=64, lr=1e-3,  ep=20  → NDCG@10 +12.56%  (ALL_IMPROVED)
#   contiguous: k=1,  bd=16, lr=5e-4,  ep=20  → NDCG@10  +4.58%  (ALL_IMPROVED)
# Defaults below use tail best (stronger signal). Override per split as needed.

adapter:
  num_clusters:   5
  bottleneck_dim: 64

training:
  lr: 1e-3
  weight_decay: 0.0
  epochs: 20
  batch_size: 256
  eval_batch_size: 512
  seed: 42

evaluation:
  num_neg_eval: 100
  seed: 42

sweep:
  num_clusters:   [1, 3, 5, 10, 20]
  bottleneck_dim: [16, 32, 64]
  lr:             [1e-3, 5e-4]
  epochs:         [20, 50]
