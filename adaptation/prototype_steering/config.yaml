# adaptation/prototype_steering/config.yaml

adapter:
  num_clusters:   5   # best from full sweep [k=1,3,5,10] (tail: k5/bd32/lr1e-3 → NDCG@10 +2.24%; contiguous degraded across all k)
  bottleneck_dim: 32

training:
  lr: 1e-3
  weight_decay: 0.0
  epochs: 20
  batch_size: 256
  num_neg_train: 10
  seed: 42

evaluation:
  num_neg_eval: 100
  seed: 42

sweep:
  num_clusters:   [1, 3, 5, 10]
  bottleneck_dim: [16, 32, 64]
  lr:             [1e-3, 5e-4]
